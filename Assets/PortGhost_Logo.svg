<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:rgba(0, 255, 204, 0)"/>
            <stop offset="50%" style="stop-color:rgba(0, 255, 204, 0.4)"/>
            <stop offset="100%" style="stop-color:rgba(0, 255, 204, 0)"/>
        </linearGradient>
    </defs>
    
    <!-- Background Circle for contrast, like a radar/scanner -->
    <circle cx="256" cy="256" r="240" fill="#151522" stroke="#2d2d44" stroke-width="12"/>
    
    <!-- Crosshairs (radar theme) -->
    <path d="M 256 36 L 256 476 M 36 256 L 476 256" stroke="#2d2d44" stroke-width="4" stroke-dasharray="10 10"/>
    <circle cx="256" cy="256" r="160" fill="none" stroke="#2d2d44" stroke-width="4" stroke-dasharray="10 10"/>
    <circle cx="256" cy="256" r="80" fill="none" stroke="#2d2d44" stroke-width="4" stroke-dasharray="10 10"/>

    <!-- Network Port Plug element replacing the ghost tail -->
    <path d="M 196 410 L 196 460 L 316 460 L 316 410 Z" fill="#2d2d44" stroke="#00ffcc" stroke-width="4"/>
    <path d="M 226 460 L 226 490 M 256 460 L 256 490 M 286 460 L 286 490" stroke="#00ffcc" stroke-width="6" stroke-linecap="round"/>

    <!-- The Ghost vector -->
    <path d="M 156 320 C 156 180, 206 120, 256 120 C 306 120, 356 180, 356 320 L 356 412 L 156 412 Z" 
          fill="url(#ghostGrad)" filter="url(#glow)"/>
          
    <!-- Ghost Eyes (scary/cute) -->
    <ellipse cx="216" cy="220" rx="16" ry="24" fill="#151522"/>
    <ellipse cx="296" cy="220" rx="16" ry="24" fill="#151522"/>
    
    <circle cx="216" cy="220" r="6" fill="#00ffcc"/>
    <circle cx="296" cy="220" r="6" fill="#00ffcc"/>

    <!-- Angry Eyebrows -->
    <path d="M 190 180 L 230 200" stroke="#151522" stroke-width="8" stroke-linecap="round"/>
    <path d="M 322 180 L 282 200" stroke="#151522" stroke-width="8" stroke-linecap="round"/>

    <!-- Red glowing target marker over the ghost (busting it) -->
    <path d="M 216 256 L 296 256 M 256 216 L 256 296" stroke="#ff3366" stroke-width="8" filter="url(#glow)"/>
    <circle cx="256" cy="256" r="45" fill="none" stroke="#ff3366" stroke-width="6" filter="url(#glow)"/>

    <!-- Scanline effect -->
    <rect x="0" y="0" width="512" height="512" fill="url(#scanline)" stroke="none" style="mix-blend-mode: overlay;"/>
</svg>
